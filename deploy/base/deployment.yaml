apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-reactor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-reactor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-reactor
    spec:
      serviceAccountName: event-reactor
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-reactor
          image: ghcr.io/oakwood-commons/event-reactor:latest
          args:
            - run
            - server
            - --config=/etc/event-reactor/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/event-reactor
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: event-reactor-config
